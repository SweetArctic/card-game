<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Sandbox para Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Mi Juego Sandbox</h1>
        <canvas id="game-canvas"></canvas>
        <div id="ui">
            <p><strong>Instrucciones:</strong> Click izquierdo para colocar, click derecho para eliminar.</p>
            <div id="inventory">
                <button class="block-btn selected" data-type="grass">Hierba</button>
                <button class="block-btn" data-type="dirt">Tierra</button>
                <button class="block-btn" data-type="stone">Piedra</button>
                <button class="block-btn" data-type="wood">Madera</button>
            </div>
            <div id="controls" style="margin-top: 15px;">
                <button id="clear-btn" class="block-btn" style="background-color: #e74c3c; color: white;">Limpiar Todo</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
